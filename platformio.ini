; PlatformIO Project Configuration File
; ESP32 CYD (Cheap Yellow Display - ESP32-2432S028R)
; WiFi Scanner with TFT display, touch, and web UI

[env]
monitor_speed  = 115200
upload_port    = /dev/cu.usbserial-130

[env:esp32-cyd]
platform  = espressif32
board     = esp32dev
framework = arduino

lib_deps =
  bodmer/TFT_eSPI                  @ ^2.5.43
  paulstoffregen/XPT2046_Touchscreen
  tzapu/WiFiManager                @ ^2.0.17
  mathieucarbou/ESP Async WebServer @ ^3.0.6
  mathieucarbou/AsyncTCP           @ ^3.3.2
  bblanchon/ArduinoJson            @ ^6.21.0

build_flags =
  ; ---- TFT_eSPI: ILI9341 on HSPI (CLK=14, MOSI=13, MISO=12) ----
  -DUSER_SETUP_LOADED=1
  -DILI9341_DRIVER=1
  -DTFT_MISO=12
  -DTFT_MOSI=13
  -DTFT_SCLK=14
  -DTFT_CS=15
  -DTFT_DC=2
  -DTFT_RST=-1
  -DTFT_BL=21
  -DTFT_BACKLIGHT_ON=HIGH
  ; Fonts to load
  -DLOAD_GLCD=1
  -DLOAD_FONT2=1
  -DLOAD_FONT4=1
  -DLOAD_GFXFF=1
  -DSMOOTH_FONT=1
  ; SPI speeds
  -DSPI_FREQUENCY=55000000
  -DSPI_READ_FREQUENCY=20000000
  ; NOTE: No TOUCH_CS here - touch runs on separate VSPI bus via XPT2046_Touchscreen
